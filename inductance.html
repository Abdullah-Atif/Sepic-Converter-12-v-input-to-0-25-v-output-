<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Inductor Designer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; }
        .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        .results { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid #007bff; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .res-val { font-weight: bold; color: #007bff; }
        span.unit { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>Inductor Design (Auto-Calc)</h2>

    <div class="section">
        <label>Target Inductance (µH)</label>
        <input type="number" id="L_target" value="100" oninput="calc()">
        <br>
        <label>Max Current (Amperes)</label>
        <input type="number" id="I_max" value="5" oninput="calc()">
    </div>

    <div class="section">
        <label style="color: #007bff;">Core Dimensions (mm)</label>
        <div class="grid">
            <div>
                <label>Outer Diameter (OD)</label>
                <input type="number" id="od" value="25" oninput="calc()">
            </div>
            <div>
                <label>Inner Diameter (ID)</label>
                <input type="number" id="id" value="15" oninput="calc()">
            </div>
            <div>
                <label>Height / Thickness (H)</label>
                <input type="number" id="height" value="10" oninput="calc()">
            </div>
            <div>
                <label>Relative Permeability (μᵣ)</label>
                <input type="number" id="mur" value="2000" oninput="calc()">
            </div>
        </div>
    </div>

    <div class="results">
        <div class="res-item"><span>Required Turns:</span> <span id="resTurns" class="res-val">0</span></div>
        <div class="res-item"><span>Wire Diameter:</span> <span id="resDia" class="res-val">0</span> <span class="unit">mm</span></div>
        <div class="res-item"><span>AWG / SWG:</span> <span id="resGauges" class="res-val">- / -</span></div>
        <div class="res-item"><span>Core Area (Ae):</span> <span id="resAe" class="res-val">0</span> <span class="unit">mm²</span></div>
    </div>
</div>

<script>
function calc() {
    // Inputs
    const L_uH = parseFloat(document.getElementById('L_target').value) || 0;
    const I = parseFloat(document.getElementById('I_max').value) || 0;
    const OD = parseFloat(document.getElementById('od').value) || 0;
    const ID = parseFloat(document.getElementById('id').value) || 0;
    const H = parseFloat(document.getElementById('height').value) || 0;
    const mur = parseFloat(document.getElementById('mur').value) || 0;

    if (OD <= ID || L_uH <= 0 || mur <= 0) return;

    // 1. Calculate Core Geometry
    const Ae = (OD - ID) * H / 2; // Cross sectional area in mm2
    const le = Math.PI * (OD + ID) / 2; // Mean magnetic path length in mm
    
    // 2. Calculate AL Value (nH/N²)
    // Formula: AL = (mu0 * mur * Ae) / le
    const mu0 = 4 * Math.PI * 1e-7;
    const AL_nH = (mu0 * mur * (Ae * 1e-6) / (le * 1e-3)) * 1e9;

    // 3. Calculate Turns
    const turns = Math.ceil(Math.sqrt((L_uH * 1000) / AL_nH));

    // 4. Wire Calculation (Current Density J = 4A/mm2)
    const areaNeeded = I / 4;
    const dia = Math.sqrt((4 * areaNeeded) / Math.PI);
    
    // AWG Estimation
    let awg = Math.round(-8.74 * Math.log(dia / 0.127) + 36);
    // SWG Estimation (Approx)
    let swg = Math.round(dia > 1 ? 18 - (dia-1)*5 : 20 + (1-dia)*11);

    // Update UI
    document.getElementById('resTurns').innerText = turns;
    document.getElementById('resDia').innerText = dia.toFixed(3);
    document.getElementById('resGauges').innerText = `AWG ${awg} / SWG ${swg}`;
    document.getElementById('resAe').innerText = Ae.toFixed(2);
}

// Initial Call
calc();
</script>

</body>
</html>
