<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coil Designer - SWG Based</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; display: flex; justify-content: center; }
        .app-card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .input-group { margin-top: 15px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; color: #34495e; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .result-container { margin-top: 25px; background: #2d3436; color: white; padding: 20px; border-radius: 10px; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: monospace; }
        .val { color: #55efc4; font-weight: bold; font-size: 16px; }
        .highlight { border-left: 4px solid #3498db; padding-left: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Inductor Turn Calc</h2>

    <div class="highlight">
        <div class="input-group">
            <label>Target Inductance (µH)</label>
            <input type="number" id="L_target" value="100" oninput="updateDesign()">
        </div>
        <div class="input-group">
            <label>Max Current (Amps)</label>
            <input type="number" id="I_max" value="2" oninput="updateDesign()">
        </div>
    </div>

    <div class="input-group">
        <label>Form/Core Diameter (mm)</label>
        <input type="number" id="D_form" value="20" oninput="updateDesign()">
    </div>

    <div class="input-group">
        <label>Wire SWG (Manual Override)</label>
        <select id="swg_select" onchange="updateDesign()">
            <option value="18">18 SWG (1.219 mm)</option>
            <option value="20">20 SWG (0.914 mm)</option>
            <option value="22" selected>22 SWG (0.711 mm)</option>
            <option value="24">24 SWG (0.559 mm)</option>
            <option value="26">26 SWG (0.457 mm)</option>
            <option value="30">30 SWG (0.315 mm)</option>
        </select>
    </div>

    <div class="result-container">
        <div class="result-line"><span>Calculated Turns:</span> <span id="resN" class="val">0</span></div>
        <div class="result-line"><span>Wire Diameter:</span> <span id="resDia" class="val">0 mm</span></div>
        <div class="result-line"><span>Coil Length:</span> <span id="resLen" class="val">0 mm</span></div>
        <div class="result-line"><span>Current Capacity:</span> <span id="resCap" class="val">0 A</span></div>
    </div>
</div>

<script>
// SWG to Diameter (mm) Table
const swgTable = {
    "18": 1.219, "20": 0.914, "22": 0.711, "24": 0.559, "26": 0.457, "30": 0.315
};

function updateDesign() {
    const L = parseFloat(document.getElementById('L_target').value) || 0;
    const D = parseFloat(document.getElementById('D_form').value) || 0;
    const swg = document.getElementById('swg_select').value;
    const d_wire = swgTable[swg]; // Wire diameter in mm

    if (L <= 0 || D <= 0) return;

    /* Wheeler's Formula for Single-Layer Air Core:
       L (uH) = (d^2 * n^2) / (18d + 40l)
       Here, l = n * d_wire (winding length)
    */
    
    // Iterative calculation to find Turns (N) because N depends on Length which depends on N
    let N = 10; // Initial guess
    for(let i=0; i<10; i++) {
        let length = N * d_wire; // Close-wound length
        // Solving Wheeler's for N: N = sqrt( L * (18d + 40l) / d^2 )
        // Note: d in formula is inches. Converting mm to inches:
        let D_inch = D / 25.4;
        let l_inch = length / 25.4;
        N = Math.sqrt( (L * (18 * D_inch + 40 * l_inch)) / (D_inch * D_inch) );
    }

    const finalN = Math.ceil(N);
    const finalLength = finalN * d_wire;
    
    // Current Capacity (Approx 3A/mm2)
    const area = Math.PI * Math.pow(d_wire/2, 2);
    const capacity = area * 3;

    // Update UI
    document.getElementById('resN').innerText = finalN;
    document.getElementById('resDia').innerText = d_wire.toFixed(3);
    document.getElementById('resLen').innerText = finalLength.toFixed(2);
    document.getElementById('resCap').innerText = capacity.toFixed(2);
}

updateDesign();
</script>

</body>
</html>
