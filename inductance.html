<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inductor Designer Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        label { font-size: 13px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-top: 5px; }
        .result-box { margin-top: 25px; background: #343a40; color: #fff; padding: 20px; border-radius: 8px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #454d55; padding-bottom: 5px; }
        .value { color: #00d1b2; font-weight: bold; }
        .warning { color: #ff3860; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#2c3e50;">Inductor Turn Calculator</h2>
    
    <div>
        <label>Target Inductance (µH)</label>
        <input type="number" id="L" value="220" oninput="calculate()">
    </div>

    <div class="input-grid">
        <div>
            <label>Outer Dia (mm)</label>
            <input type="number" id="od" value="25" oninput="calculate()">
        </div>
        <div>
            <label>Inner Dia (mm)</label>
            <input type="number" id="id" value="15" oninput="calculate()">
        </div>
        <div>
            <label>Height (mm)</label>
            <input type="number" id="h" value="10" oninput="calculate()">
        </div>
        <div>
            <label>Permeability (μᵣ)</label>
            <input type="number" id="mur" value="2500" oninput="calculate()">
        </div>
        <div>
            <label>Max Current (A)</label>
            <input type="number" id="current" value="3" oninput="calculate()">
        </div>
    </div>

    <div class="result-box">
        <div class="res-row"><span>Required Turns:</span> <span id="resN" class="value">0</span></div>
        <div class="res-row"><span>Wire SWG:</span> <span id="resSWG" class="value">0</span></div>
        <div class="res-row"><span>Wire Dia:</span> <span id="resDia" class="value">0 mm</span></div>
        <div id="spaceWarn" class="warning">⚠️ Warning: Wire too thick for this core!</div>
    </div>
</div>

<script>
function calculate() {
    const L = parseFloat(document.getElementById('L').value) || 0;
    const od = parseFloat(document.getElementById('od').value) || 0;
    const id = parseFloat(document.getElementById('id').value) || 0;
    const h = parseFloat(document.getElementById('h').value) || 0;
    const mur = parseFloat(document.getElementById('mur').value) || 0;
    const current = parseFloat(document.getElementById('current').value) || 0;

    if (od <= id || L <= 0) return;

    // 1. Calculate Core Parameters
    const Ae = ((od - id) / 2) * h; // mm^2
    const le = Math.PI * ((od + id) / 2); // mm
    const mu0 = 1.2566e-6;
    
    // AL calculation in nH/N^2
    const AL = (mu0 * mur * (Ae * 1e-6) / (le * 1e-3)) * 1e9;
    
    // 2. Turns calculation
    const N = Math.ceil(Math.sqrt((L * 1000) / AL));

    // 3. Wire Diameter based on Current (3A/mm^2 density)
    const wireArea = current / 3; 
    const wireDia = Math.sqrt((4 * wireArea) / Math.PI);

    // 4. SWG Calculation (Simplified Table Logic)
    let swg = Math.round(18 - (wireDia - 1.2) * 5); 
    if(wireDia < 0.2) swg = 36;
    else if(wireDia < 0.5) swg = 25;
    else if(wireDia < 1.0) swg = 20;

    // 5. Space Check (Window Area vs Wire Area)
    const windowArea = (Math.PI * Math.pow(id/2, 2));
    const totalWireArea = N * wireArea * 2.5; // 2.5 is packing factor
    const warn = document.getElementById('spaceWarn');
    warn.style.display = (totalWireArea > windowArea) ? "block" : "none";

    // Update Display
    document.getElementById('resN').innerText = N;
    document.getElementById('resSWG').innerText = swg;
    document.getElementById('resDia').innerText = wireDia.toFixed(2) + " mm";
}

calculate(); // Initial run
</script>
</body>
</html>
