<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic SEPIC Lab Tool - BUET EEE</title>
    <style>
        :root { --primary: #1a252f; --accent: #2980b9; --bg: #fdfefe; --warn: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff2; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 650px; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 8px solid var(--accent); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .section-title { color: var(--accent); border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 25px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: #34495e; }
        input { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; box-sizing: border-box; transition: 0.3s; font-weight: bold; }
        input:focus { border-color: var(--accent); outline: none; }
        .res-box { background: #f4faff; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #d6eaf8; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-family: 'Consolas', monospace; }
        .val { font-weight: bold; color: #c0392b; }
        .warning-box { font-size: 0.85rem; margin-top: 15px; padding: 12px; border-radius: 8px; border-left: 5px solid #f1c40f; background: #fffde7; color: #856404; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ SEPIC Project Advanced Calc</h2>

    <div class="section-title">1. Hardware Settings</div>
    <div class="grid">
        <div>
            <label>Input Voltage (Vin) [V]</label>
            <input type="number" id="vin" value="12" oninput="runCalc()">
        </div>
        <div>
            <label>Load Resistor (Ω)</label>
            <input type="number" id="loadR" value="33" oninput="runCalc()">
        </div>
        <div>
            <label>Duty Cycle (%) [0-72]</label>
            <input type="number" id="duty" value="72" min="0" max="72" oninput="runCalc()">
        </div>
        <div>
            <label>Primary Inductor (L1) [uH]</label>
            <input type="number" id="lValue" value="70" oninput="runCalc()">
        </div>
    </div>

    <div id="alertBox" class="warning-box"></div>

    <div class="section-title">2. Real-time Output Data</div>
    <div class="res-box">
        <div class="res-row"><span>Output Voltage (Vout):</span> <span class="val" id="vout">0 V</span></div>
        <div class="res-row"><span>Output Current (Iout):</span> <span class="val" id="iout">0 A</span></div>
        <div class="res-row"><span>Avg Input Current (Iin):</span> <span class="val" id="iin">0 A</span></div>
    </div>

    <div class="section-title">3. Component Stress Levels</div>
    <div class="res-box">
        <div class="res-row"><span>Ripple Current (ΔIL):</span> <span class="val" id="ripple">0 A</span></div>
        <div class="res-row"><span>Diode Peak (Id_max):</span> <span class="val" id="idmax">0 A</span></div>
        <div class="res-row"><span>Arduino OCR1A Value:</span> <span class="val" id="ocr">0</span></div>
    </div>
</div>

<script>
    function runCalc() {
        let vin = parseFloat(document.getElementById('vin').value) || 0;
        let rLoad = parseFloat(document.getElementById('loadR').value);
        let alert = document.getElementById('alertBox');

        // Warning for low resistance without forcing a change
        if (rLoad < 10 && rLoad > 0) {
            alert.style.display = "block";
            alert.innerHTML = "<strong>Warning:</strong> Load resistance is below 10Ω. Calculation might not be accurate and Output Voltage will drop due to high power demand.";
        } else if (rLoad <= 0) {
            alert.style.display = "block";
            alert.innerHTML = "<strong>Error:</strong> Resistance must be greater than 0.";
        } else {
            alert.style.display = "none";
        }

        // Standard calculations continue even with low R
        const dInput = parseFloat(document.getElementById('duty').value) || 0;
        const d = dInput / 100;
        const lH = (parseFloat(document.getElementById('lValue').value) || 70) * 1e-6;
        const fsw = 10000; 

        let vout = (vin * (d / (1 - d))) - 0.6;
        if (vout < 0) vout = 0;

        let iout = (rLoad > 0) ? (vout / rLoad) : 0;
        let iin = iout * (d / (1 - d));
        let ripple = (vin * d) / (lH * fsw);
        let id_peak = iin + iout + (ripple / 2);

        // Display update
        document.getElementById('vout').innerText = vout.toFixed(2) + " V";
        document.getElementById('iout').innerText = iout.toFixed(3) + " A";
        document.getElementById('iin').innerText = iin.toFixed(3) + " A";
        document.getElementById('ripple').innerText = ripple.toFixed(3) + " A";
        document.getElementById('idmax').innerText = id_peak.toFixed(3) + " A";
        document.getElementById('ocr').innerText = Math.round(d * 199);
    }
    runCalc();
</script>

</body>
</html>
