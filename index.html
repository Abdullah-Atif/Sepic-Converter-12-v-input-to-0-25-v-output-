<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino SEPIC Generator - BUET EEE</title>
    <style>
        :root { --primary: #1a252f; --accent: #2980b9; --bg: #f4f7f6; --code-bg: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; border-bottom: 3px solid var(--accent); display: inline-block; width: 100%; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
        .res-box { background: #eef9ff; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #d1e9ff; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-family: monospace; }
        .val { font-weight: bold; color: #d35400; }
        
        /* Code Box Styles */
        .code-header { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; background: #34495e; color: white; padding: 10px 15px; border-radius: 8px 8px 0 0; }
        pre { background: var(--code-bg); color: #dfe6e9; padding: 15px; border-radius: 0 0 8px 8px; overflow-x: auto; font-size: 0.85rem; margin-top: 0; line-height: 1.5; }
        .copy-btn { background: #1abc9c; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .copy-btn:hover { background: #16a085; }
        .warning { font-size: 0.8rem; color: #856404; background: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ SEPIC Lab & Code Generator</h2>

    <div class="grid">
        <div>
            <label>Input Voltage (Vin) [V]</label>
            <input type="number" id="vin" value="12" oninput="runCalc()">
        </div>
        <div>
            <label>Load Resistor (Ω)</label>
            <input type="number" id="loadR" value="33" oninput="runCalc()">
        </div>
        <div>
            <label>Switching Freq (Hz)</label>
            <input type="number" id="fsw" value="10000" oninput="runCalc()">
        </div>
        <div>
            <label>Max Duty Cycle (%)</label>
            <input type="number" id="duty" value="72" oninput="runCalc()">
        </div>
    </div>

    <div id="warn" class="warning">Warning: Low resistance! Check heat.</div>

    <div class="res-box">
        <div class="res-row"><span>Vout (Expected):</span> <span class="val" id="vout">0 V</span></div>
        <div class="res-row"><span>Ripple (ΔIL):</span> <span class="val" id="ripple">0 A</span></div>
        <div class="res-row"><span>ICR1 (TOP):</span> <span class="val" id="icrVal">0</span></div>
    </div>

    <div class="code-header">
        <span>Arduino Timer 1 Code</span>
        <button class="copy-btn" onclick="copyCode()">Copy Code</button>
    </div>
    <pre id="arduinoCode"></pre>
</div>

<script>
    function runCalc() {
        const vin = parseFloat(document.getElementById('vin').value) || 0;
        const rLoad = parseFloat(document.getElementById('loadR').value) || 1;
        const fsw = parseFloat(document.getElementById('fsw').value) || 10000;
        const dMax = parseFloat(document.getElementById('duty').value) || 72;
        const lH = 70e-6; // 70uH

        // Basic Calc
        let d = dMax / 100;
        let vout = (vin * (d / (1 - d))) - 0.6;
        if (vout < 0) vout = 0;
        let ripple = (vin * d) / (lH * fsw);

        // Timer Calc (16MHz, Prescaler 8)
        let icr1 = Math.round((16000000 / (fsw * 8)) - 1);
        let maxOCR = Math.round((dMax / 100) * icr1);

        // Display
        document.getElementById('vout').innerText = vout.toFixed(2) + " V";
        document.getElementById('ripple').innerText = ripple.toFixed(3) + " A";
        document.getElementById('icrVal').innerText = icr1;
        document.getElementById('warn').style.display = (rLoad < 10) ? "block" : "none";

        // Generate Code String
        const code = `// SEPIC PWM Generator (10-bit Timer 1)
// Frequency: ${fsw} Hz | Max Duty: ${dMax}%
const int potPin = A0;
const int pwmPin = 9;

void setup() {
  pinMode(pwmPin, OUTPUT);
  TCCR1A = 0; TCCR1B = 0; TCNT1 = 0;

  // Fast PWM Mode 14 (ICR1 as TOP)
  TCCR1A |= (1 << COM1A1) | (1 << WGM11);
  TCCR1B |= (1 << WGM13) | (1 << WGM12) | (1 << CS11); // Prescaler 8

  ICR1 = ${icr1}; // Set Frequency
}

void loop() {
  int pot = analogRead(potPin);
  // Map Pot (0-1023) to restricted Duty Cycle (0-${maxOCR})
  int dutyValue = map(pot, 0, 1023, 0, ${maxOCR});
  OCR1A = dutyValue;
  delay(1);
}`;
        document.getElementById('arduinoCode').innerText = code;
    }

    function copyCode() {
        const text = document.getElementById('arduinoCode').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Code copied to clipboard!"));
    }

    runCalc();
</script>

</body>
</html>
