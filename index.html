<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino SEPIC Controller - Lab Tool</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .arduino-tip { font-size: 0.85rem; color: #666; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ SEPIC Project Calculator</h2>
    
    <label>Input Voltage (V<sub>in</sub>) [V]</label>
    <input type="number" id="vin" value="12" oninput="calculate()">

    <label>Current Duty Cycle (%) [0-72]</label>
    <input type="range" id="dutyRange" min="0" max="72" value="50" oninput="updateFromRange()">
    <input type="number" id="dutyNum" min="0" max="72" value="50" oninput="updateFromNum()">

    <label>Arduino Analog Mapping (0-1023)</label>
    <input type="number" id="potVal" readonly>

    <div class="result-box">
        <strong>Expected Output (V<sub>out</sub>):</strong> 
        <span id="voutResult" style="font-size: 1.5rem; color: #d35400;">0.00</span> V
    </div>

    <div class="arduino-tip">
        * Based on Arduino UNO @ 10kHz frequency. <br>
        * Range: 0-72% Duty Cycle for 0-30V Output.
    </div>
</div>

<script>
    function updateFromRange() {
        document.getElementById('dutyNum').value = document.getElementById('dutyRange').value;
        calculate();
    }

    function updateFromNum() {
        document.getElementById('dutyRange').value = document.getElementById('dutyNum').value;
        calculate();
    }

    function calculate() {
        let vin = parseFloat(document.getElementById('vin').value);
        let d = parseFloat(document.getElementById('dutyNum').value) / 100;
        let vd = 0.5; // Diode Drop

        // Pot mapping for Arduino (0-1023 to 0-72%)
        let pot = Math.round((d * 100 / 72) * 1023);
        document.getElementById('potVal').value = pot;

        // SEPIC Formula: Vout = Vin * (D / (1 - D)) - Vd
        let vout = 0;
        if (d < 1) {
            vout = (vin * (d / (1 - d))) - vd;
        }
        
        if (vout < 0) vout = 0;
        
        document.getElementById('voutResult').innerText = vout.toFixed(2);
    }

    // Initialize
    calculate();
</script>

</body>
</html>
